name: "Run Container Scan on Super Mario Docker Image with Quality Gate"
 
on:
  push:
    branches:
      - main
 
env:
  VERSION: $(( $(cat version.txt) + 1 ))
  
jobs:
  
  run_container_image_scan_on_supermario_docker_image:
    runs-on: ubuntu-latest	
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
 
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        
      - name: Get Docker Image from Docker Hub
        run: |
          #docker build -t docker.io/smitasulikal/supermariogitops:${{ env.VERSION }} .
          #docker push docker.io/smitasulikal/supermariogitops:${{ env.VERSION }}
          docker pull docker.io/smitasulikal/supermariogitops:2
          docker save -o docker.io/smitasulikal/supermariogitops:2 supermariolatestdockerimage.tar

          
      - name: Verify file exists
        run: ls -l

      #- name: Scan with Trivy
      #  run: trivy image --input supermariolatestdockerimage.tar
      
      
      - name: Run Trivy vulnerability scanner in tarball mode
        uses: aquasecurity/trivy-action@master
        with:
          input: /github/workspace/supermariolatestdockerimage.tar
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
