name: "Run Container Scan on Super Mario Docker Image with Quality Gate"
 
on:
  push:
    branches:
      - main
 
#env:
#  VERSION: $(( $(cat version.txt) + 1 ))
  
jobs:
  
  run_container_image_scan_on_supermario_docker_image:
    runs-on: ubuntu-latest	
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
 
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin          
      
      - name: Get Docker Image from Docker Hub
        run: |
          docker pull docker.io/raghuthesecurityexpert/supermariogitopsproject:2

     - name: Run Trivy scan on image
       uses: aquasecurity/trivy-action@master
       with:
          image-ref: docker.io/smitasulikal/supermariogitops:2
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true