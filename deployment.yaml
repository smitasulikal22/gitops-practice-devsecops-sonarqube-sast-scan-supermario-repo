apiVersion: apps/v1
kind: Deployment
metadata:
  name: supermariogame-deployment1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: supermariogame
  template:
    metadata:
      labels:
        app: supermariogame
    spec:
      containers:
      - image: docker.io/smitasulikal/supermariogitops:11
        name: supermariogame-container
        ports:
        - containerPort: 8080
 
---
apiVersion: v1
kind: Service
metadata:
  name: supermariogame-service1
spec:
  selector:
    app: supermariogame
  ports:
  - protocol: TCP
    port: 8000  
    targetPort: 8080
  type: LoadBalancer
